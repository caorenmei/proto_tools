name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.4"

      - name: Setup LuaRocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Cache LuaRocks dependencies
        uses: actions/cache@v4
        with:
          path: ~/.luarocks
          key: ${{ runner.os }}-luarocks-${{ hashFiles('*.rockspec') }}
          restore-keys: |
            ${{ runner.os }}-luarocks-

      - name: Install dependencies
        run: luarocks install --only-deps proto_tools-dev-1.rockspec

      - name: Run tests
        run: busted lua_tests/
